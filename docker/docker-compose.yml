version: '3.8'

services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: ${NODE_NAME}
    network_mode: "host"
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - tailscale_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    network_mode: "host"
    depends_on:
      - tailscale
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=Developer
      - MSSQL_TCP_PORT=14333
      - MSSQL_NETWORK_RPCPORT=13500
      - MSSQL_DISTRIBUTEDTRANSACTION_TURNOFFRPCSECURITY=1
    volumes:
      - sqldata:/var/opt/mssql
    restart: unless-stopped

volumes:
  tailscale_state:
  sqldata: